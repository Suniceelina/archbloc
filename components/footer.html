<script>
// ── Tally embed loader ──
(function(){
  var d=document,w="https://tally.so/widgets/embed.js",
  v=function(){"undefined"!=typeof Tally?Tally.loadEmbeds():d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach(function(e){e.src=e.dataset.tallySrc})};
  if("undefined"!=typeof Tally)v();
  else if(!d.querySelector('script[src="'+w+'"]')){var s=d.createElement("script");s.src=w;s.onload=v;s.onerror=v;d.body.appendChild(s);}
})();

// ── Modal ──
function openModal(id){
  var el=document.getElementById(id);
  if(!el)return;
  el.classList.add('open');
  document.body.style.overflow='hidden';
  el.querySelectorAll('iframe[data-tally-src]:not([src])').forEach(function(f){f.src=f.dataset.tallySrc;});
}
function closeModal(id){
  var el=document.getElementById(id);
  if(!el)return;
  el.classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('.modal-overlay').forEach(function(overlay){
    overlay.addEventListener('click',function(e){if(e.target===overlay)closeModal(overlay.id);});
  });
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape')document.querySelectorAll('.modal-overlay.open').forEach(function(m){closeModal(m.id);});
  });

  // ── Nav 交互（汉堡 + 下拉）──
  var btn=document.querySelector('.nav-menu-btn');
  var nav=document.querySelector('.nav-links');
  if(!btn||!nav)return;

  function closeAllDropdowns(){
    nav.querySelectorAll('.has-dropdown').forEach(function(l){l.classList.remove('dd-open');});
  }
  btn.addEventListener('click',function(e){
    e.stopPropagation();
    var isOpen=nav.classList.contains('nav-open');
    nav.classList.toggle('nav-open',!isOpen);
    btn.setAttribute('aria-expanded',String(!isOpen));
    if(isOpen) closeAllDropdowns();
  });
  nav.querySelectorAll('.has-dropdown>a').forEach(function(a){
    a.addEventListener('click',function(e){
      if(window.matchMedia('(hover:hover)').matches) return;
      e.preventDefault();
      e.stopPropagation();
      var li=a.parentElement;
      var wasOpen=li.classList.contains('dd-open');
      closeAllDropdowns();
      if(!wasOpen) li.classList.add('dd-open');
    });
  });
  nav.querySelectorAll('a').forEach(function(a){
    if(a.parentElement.classList.contains('has-dropdown')) return;
    a.addEventListener('click',function(){
      nav.classList.remove('nav-open');
      btn.setAttribute('aria-expanded','false');
      closeAllDropdowns();
    });
  });
  document.addEventListener('click',function(e){
    if(!nav.contains(e.target)&&!btn.contains(e.target)){
      nav.classList.remove('nav-open');
      btn.setAttribute('aria-expanded','false');
      closeAllDropdowns();
    }
  });

  // ── 当前页面导航高亮 ──
  var path=window.location.pathname;
  nav.querySelectorAll('a').forEach(function(a){
    var href=a.getAttribute('href');
    if(!href)return;
    // 精确匹配路径（忽略 query/hash），根路径特殊处理
    var aPath=href.split('?')[0].split('#')[0];
    if(aPath===path||(path==='/'&&aPath==='/')) a.classList.add('active');
  });
});
</script>
