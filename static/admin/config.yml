backend:
  name: github
  repo: Suniceelina/archbloc
  branch: main
  base_url: https://archbloc.com
  auth_endpoint: /api/auth

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

locale: zh_Hans

collections:
  - name: "blog"
    label: "博客文章"
    folder: "blog"
    create: true
    slug: "{{slug}}"
    identifier_field: slug
    fields:

      # ── SEO / Head ──────────────────────────────────────────
      - label: "页面标题 (title)"
        name: title
        widget: string
        hint: "用于 <title> 标签，建议 50–60 字符"

      - label: "页面描述 (description)"
        name: description
        widget: text
        hint: "用于 meta description，建议 120–160 字符"

      - label: "Canonical URL"
        name: canonical
        widget: string
        required: false
        hint: "留空则自动使用当前页面 URL"

      - label: "Slug（URL 路径）"
        name: slug
        widget: string
        hint: "仅英文小写、数字和连字符，如 geo-strategy-2025"

      - label: "OG 封面图"
        name: og_image
        widget: image
        required: false
        hint: "推荐尺寸 1200×630 px"

      # ── Schema.org ──────────────────────────────────────────
      - label: "Schema 结构化数据 (JSON-LD)"
        name: schema
        widget: code
        default_language: json
        required: false
        hint: "粘贴完整 Article / BreadcrumbList 等 JSON-LD 对象"

      # ── 分类 & 标签 ─────────────────────────────────────────
      - label: "分类"
        name: category
        widget: select
        options:
          - { label: "地缘策略", value: "geo-strategy" }
          - { label: "政策解读", value: "policy" }
          - { label: "行业洞察", value: "industry" }
          - { label: "案例研究", value: "case-study" }
          - { label: "其他", value: "other" }
        default: "other"

      - label: "标签"
        name: tags
        widget: list
        field:
          label: 标签
          name: tag
          widget: string
        required: false

      # ── 文章 Meta ────────────────────────────────────────────
      - label: "文章标题（H1）"
        name: post_title
        widget: string
        hint: "页面内可见的主标题，可与 SEO title 不同"

      - label: "文章摘要"
        name: excerpt
        widget: text
        hint: "显示在列表页 / 分享卡片的摘要，约 80–120 字"

      - label: "作者署名"
        name: author
        widget: string
        default: "Archbloc 策略团队"

      - label: "发布日期"
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "阅读时长（分钟）"
        name: reading_time
        widget: number
        value_type: int
        min: 1
        max: 60
        default: 5
        hint: "编辑估算，显示为"约 X 分钟阅读""

      # ── 正文 ────────────────────────────────────────────────
      - label: "正文内容"
        name: body
        widget: markdown
        hint: "支持 Markdown；图片请使用上方媒体库上传"

      # ── Callout 提示框 ───────────────────────────────────────
      - label: "Callout 提示框"
        name: callout
        widget: object
        required: false
        collapsed: true
        fields:
          - label: "类型"
            name: type
            widget: select
            options:
              - { label: "信息 (info)", value: "info" }
              - { label: "警告 (warning)", value: "warning" }
              - { label: "成功 (success)", value: "success" }
              - { label: "危险 (danger)", value: "danger" }
            default: "info"
          - label: "标题"
            name: title
            widget: string
            required: false
          - label: "内容"
            name: content
            widget: text

      # ── 目录章节 (TOC) ────────────────────────────────────────
      - label: "目录章节 (TOC)"
        name: toc
        widget: list
        required: false
        collapsed: true
        label_singular: "章节"
        fields:
          - label: "章节标题"
            name: heading
            widget: string
          - label: "锚点 ID"
            name: anchor
            widget: string
            hint: "对应正文中的 id 属性，如 section-1"

      # ── 相关文章 ─────────────────────────────────────────────
      - label: "相关文章（最多 3 篇）"
        name: related_posts
        widget: list
        max: 3
        collapsed: true
        label_singular: "相关文章"
        fields:
          - label: "标题"
            name: title
            widget: string
          - label: "链接 (slug 或完整路径)"
            name: url
            widget: string
          - label: "封面图"
            name: thumbnail
            widget: image
            required: false
